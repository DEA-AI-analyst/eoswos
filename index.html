<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EOSWOS</title>

    <style>
        :root {
            --streamlit-footer-crop: 42px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }

        .app-frame-wrap {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #ffffff;
        }

        .app-frame-wrap iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + var(--streamlit-footer-crop));
            border: 0;
            display: block;
            background: #ffffff;
        }
    </style>
</head>

<body>
    <div class="app-frame-wrap">
        <iframe
            src="https://eoswos.streamlit.app/?embed=true&embed_options=hide_loading_screen"
            allowfullscreen
            loading="eager">
        </iframe>
    </div>

    <!-- GoatCounter 방문자 카운터 위젯 -->
    <div style="position: fixed; bottom: 8px; right: 8px; z-index: 9999; font-family: sans-serif; font-size: 13px; background: rgba(255,255,255,0.85); padding: 4px 10px; border-radius: 6px;">
      방문자 수: <span id="visit-count">-</span>
    </div>
    <script>
      var r = new XMLHttpRequest();
      r.addEventListener('load', function() {
        document.querySelector('#visit-count').innerText = JSON.parse(this.responseText).count;
      });
      r.open('GET', 'https://eoswos.goatcounter.com/counter/TOTAL.json');
      r.send();
    </script>
    
    <!-- GoatCounter -->
    <script data-goatcounter="https://eoswos.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
